<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register VPSarote</title>
    <link rel="stylesheet" href="./css/registerlogin.css" />
    <script src="./script/general.js"></script>
</head>

<body>
  <form class="form">
    <p class="title">Registro</p>
    <p class="message">Registrate para acceder a la pagina web.</p>
    <div class="flex">
      <label>
        <input required="" placeholder="" type="text" class="input" />
        <span>Nombre</span>
      </label>

      <label>
        <input required="" placeholder="" type="text" class="input" />
        <span>Apellidos</span>
      </label>
    </div>

    <label>
      <input required="" placeholder="" type="email" class="input" />
      <span>Correo</span>
    </label>

    <label>
      <input required="" placeholder="" type="password" class="input" />
      <span>Contraseña</span>
    </label>
    <label>
      <input required="" placeholder="" type="password" class="input" />
      <span>Confirma Contraseña</span>
    </label>
    <button type="button" class="submit" onclick="window.location.href = 'index.html'">
      Hecho
    </button>
    <p class="signin">Ya tienes cuenta? <a href="login.html">Logeate</a></p>
  </form>
</body>
</html>
